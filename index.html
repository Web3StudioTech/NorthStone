<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NorthStone — Real Estate Software</title>
<meta name="description" content="NorthStone — full-suite real estate software for agencies across Malaysia, Singapore and beyond.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14181F">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --ink:#0C1D3E; --ink2:#132850; --ink3:#1A3464;
  --paper:#F4F8FF; --paper2:#FFFFFF; --paper3:#E8F0FB;
  --brass:#1A6FC4; --brass-dark:#1358A0; --brass-light:#63ABEE;
  --sage:#0EA5C9; --sage-bg:#E0F5FB;
  --clay:#B5563C; --clay-bg:#F3E2DB;
  --slate:#5B7299; --line:#D0DDF5; --line-dark:#182F60;
  --danger:#A6402C;
  --font-display:'Fraunces',serif; --font-body:'Work Sans',sans-serif; --font-mono:'IBM Plex Mono',monospace;
  --r:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;font-weight:600;letter-spacing:-0.01em;}
p{margin:0;}
a{color:inherit;text-decoration:none;}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
::selection{background:var(--brass-light);}
.mono{font-family:var(--font-mono);}
#app{min-height:100vh;}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--paper2);color:var(--ink);
  padding:9px 16px;border-radius:8px;font-size:13.5px;font-weight:600;transition:.15s;white-space:nowrap;}
.btn:hover{border-color:var(--slate);}
.btn-primary{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.btn-primary:hover{background:var(--ink2);}
.btn-brass{background:var(--brass);color:var(--ink);border-color:var(--brass);}
.btn-brass:hover{background:var(--brass-dark);color:#fff;}
.btn-ghost{background:transparent;border-color:transparent;}
.btn-ghost:hover{background:rgba(0,0,0,.05);}
.btn-danger{background:var(--paper2);color:var(--danger);border-color:var(--clay-bg);}
.btn-danger:hover{background:var(--clay-bg);}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:6px;}
.btn-block{width:100%;justify-content:center;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* ---------- Badges ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  padding:4px 9px;border-radius:99px;}
.badge-sage{background:var(--sage-bg);color:var(--sage);}
.badge-clay{background:var(--clay-bg);color:var(--clay);}
.badge-brass{background:#F6E8C7;color:var(--brass-dark);}
.badge-slate{background:#E7E9ED;color:var(--slate);}
.badge-ink{background:var(--ink);color:var(--paper);}

/* ---------- App shell ---------- */
.shell{display:flex;min-height:100vh;}
.sidebar{width:248px;background:var(--ink);color:var(--paper);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;}
.sidebar-brand{padding:22px 22px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line-dark);}
.sidebar-brand .mark{width:30px;height:30px;border-radius:7px;background:var(--brass);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:var(--ink);font-size:16px;flex-shrink:0;}
.sidebar-brand .name{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--paper);}
.sidebar-brand .sub{font-size:10.5px;color:#8B93A3;letter-spacing:.06em;text-transform:uppercase;margin-top:1px;}
.sidebar-nav{flex:1;overflow-y:auto;padding:14px 12px;}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#727B8E;padding:14px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#C7CCD6;font-size:13.5px;font-weight:500;margin-bottom:2px;}
.nav-item .ic{font-size:15px;width:18px;text-align:center;}
.nav-item:hover{background:var(--ink3);color:#fff;cursor:pointer;}
.nav-item.active{background:var(--brass);color:var(--ink);font-weight:700;}
.sidebar-foot{padding:14px;border-top:1px solid var(--line-dark);}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;}
.user-chip .av{width:32px;height:32px;border-radius:50%;background:var(--ink3);color:var(--paper);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.user-chip .meta{flex:1;min-width:0;}
.user-chip .nm{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-chip .rl{font-size:11px;color:#8B93A3;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line);background:var(--paper2);position:sticky;top:0;z-index:5;}
.topbar h1{font-size:20px;}
.topbar .crumbs{font-size:12px;color:var(--slate);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.view{padding:26px 28px 60px;}
.hamburger{display:none;}

/* ---------- Grids / cards ---------- */
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
.card{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r);padding:18px;}
.stat-card{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;}
.stat-card .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--slate);font-weight:600;}
.stat-card .val{font-family:var(--font-display);font-size:27px;margin-top:6px;}
.stat-card .sub{font-size:12px;color:var(--slate);margin-top:4px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:28px 0 14px;}
.section-head:first-child{margin-top:0;}
.section-head h2{font-size:16px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-head h3{font-size:14.5px;}
.empty{padding:40px 20px;text-align:center;color:var(--slate);font-size:13.5px;}
.empty .big{font-size:30px;margin-bottom:8px;}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--paper2);}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--slate);font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--paper3);white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#FBFAF6;}
.tname{font-weight:600;}
.tsub{font-size:11.5px;color:var(--slate);}
.row-actions{display:flex;gap:6px;}

/* ---------- Filters / toolbar ---------- */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.toolbar input, .toolbar select{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--paper2);}
.toolbar .spacer{flex:1;}
.search-box{position:relative;}
.search-box input{padding-left:30px;min-width:200px;}
.search-box .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--slate);font-size:13px;}

/* ---------- Forms / modal ---------- */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--slate);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--paper2);color:var(--ink);}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--brass);border-color:var(--brass);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.hint{font-size:11.5px;color:var(--slate);margin-top:4px;}

.modal-overlay{position:fixed;inset:0;background:rgba(20,24,31,.55);display:flex;align-items:flex-start;justify-content:center;
  padding:40px 16px;overflow-y:auto;z-index:100;}
.modal{background:var(--paper2);border-radius:14px;width:100%;max-width:560px;padding:26px 26px 22px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal.wide{max-width:760px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-head h3{font-size:18px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;border-top:1px solid var(--line);padding-top:16px;}

/* ---------- Property tag card (signature element) ---------- */
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(266px,1fr));gap:18px;}
.prop-card{position:relative;background:var(--paper2);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:.15s;}
.prop-card:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(20,24,31,.1);}
.prop-art{height:148px;display:flex;align-items:center;justify-content:center;font-size:46px;position:relative;}
.prop-tag{position:absolute;top:12px;left:-6px;background:var(--brass);color:var(--ink);font-family:var(--font-mono);font-size:10.5px;
  font-weight:700;letter-spacing:.06em;padding:5px 12px 5px 16px;border-radius:0 4px 4px 0;
  box-shadow:0 2px 6px rgba(0,0,0,.18);}
.prop-tag::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:repeating-linear-gradient(180deg,var(--brass-dark) 0 3px,transparent 3px 6px);}
.prop-tag.sold,.prop-tag.rented{background:var(--ink);color:var(--paper);}
.prop-tag.sold::before,.prop-tag.rented::before{background:repeating-linear-gradient(180deg,#000 0 3px,transparent 3px 6px);}
.prop-featured{position:absolute;top:12px;right:12px;background:var(--ink);color:var(--brass-light);font-size:10px;font-weight:700;
  padding:4px 9px;border-radius:99px;letter-spacing:.04em;}
.prop-body{padding:14px 16px 16px;}
.prop-price{font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--ink);}
.prop-price span{font-size:11px;color:var(--slate);font-weight:500;}
.prop-title{font-size:14px;font-weight:600;margin-top:5px;}
.prop-loc{font-size:12px;color:var(--slate);margin-top:2px;}
.prop-meta{display:flex;gap:12px;margin-top:10px;font-size:12px;color:var(--slate);font-family:var(--font-mono);}
.prop-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
.prop-agent{font-size:11.5px;color:var(--slate);}

/* ---------- Kanban ---------- */
.kanban{display:grid;grid-template-columns:repeat(6,minmax(200px,1fr));gap:12px;overflow-x:auto;}
.kanban-col{background:var(--paper3);border-radius:10px;padding:10px;min-width:200px;}
.kanban-col-head{display:flex;justify-content:space-between;align-items:center;padding:4px 6px 10px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--slate);}
.kanban-card{background:var(--paper2);border:1px solid var(--line);border-radius:8px;padding:10px 11px;margin-bottom:8px;font-size:12.5px;cursor:pointer;}
.kanban-card:hover{border-color:var(--brass);}
.kanban-card .kn{font-weight:700;font-size:13px;}
.kanban-card .ks{color:var(--slate);font-size:11.5px;margin-top:3px;}
.kanban-card select{margin-top:8px;width:100%;font-size:11px;padding:5px 6px;}

/* ---------- Public site ---------- */
.pub-hero{background:var(--ink);color:var(--paper);padding:70px 28px 56px;text-align:center;}
.pub-hero h1{font-size:42px;color:#fff;max-width:680px;margin:0 auto;}
.pub-hero p{color:#AEB5C2;margin-top:12px;font-size:15.5px;}
.pub-search{max-width:760px;margin:26px auto 0;background:var(--paper2);border-radius:12px;padding:14px;display:flex;gap:10px;flex-wrap:wrap;box-shadow:0 16px 40px rgba(0,0,0,.25);}
.pub-search select,.pub-search input{flex:1;min-width:120px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;color:var(--ink);background:var(--paper2);}
.pub-body{max-width:1180px;margin:0 auto;padding:36px 24px 70px;}
.pub-topnav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--ink);}
.pub-topnav .brandnm{font-family:var(--font-display);color:#fff;font-size:18px;display:flex;align-items:center;gap:8px;}
.pub-topnav .brandnm .mark{width:26px;height:26px;border-radius:6px;background:var(--brass);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}

/* ---------- Login / landing ---------- */
.land{min-height:100vh;background:var(--ink);display:flex;align-items:center;justify-content:center;padding:40px 18px;}
.land-card{max-width:920px;width:100%;display:grid;grid-template-columns:1.1fr 1fr;background:var(--paper2);border-radius:18px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);}
.land-side{background:linear-gradient(160deg,#1A2030,var(--ink) 60%);color:var(--paper);padding:46px 38px;display:flex;flex-direction:column;justify-content:space-between;}
.land-side .mark{width:42px;height:42px;border-radius:9px;background:var(--brass);color:var(--ink);font-family:var(--font-display);font-weight:700;font-size:21px;display:flex;align-items:center;justify-content:center;}
.land-side h1{font-size:30px;color:#fff;margin-top:22px;line-height:1.15;}
.land-side p{color:#9AA2B3;font-size:13.5px;margin-top:12px;line-height:1.55;}
.land-side .feat{font-size:12.5px;color:#C7CCD6;margin-top:8px;display:flex;gap:8px;align-items:flex-start;}
.land-main{padding:42px 38px;}
.role-pick{border:1px solid var(--line);border-radius:10px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.role-pick:hover{border-color:var(--brass);background:#FBF7EC;cursor:pointer;}
.role-pick .ic{font-size:20px;width:30px;text-align:center;}
.role-pick .t{font-weight:700;font-size:13.5px;}
.role-pick .d{font-size:11.5px;color:var(--slate);}

/* ---------- Misc ---------- */
.divider{height:1px;background:var(--line);margin:20px 0;}
.tag-pill{display:inline-block;background:var(--paper3);border:1px solid var(--line);font-size:11px;padding:3px 9px;border-radius:99px;margin-right:5px;color:var(--slate);font-weight:600;}
.progress{height:7px;background:var(--paper3);border-radius:99px;overflow:hidden;}
.progress > div{height:100%;background:var(--brass);}
.progress.danger > div{background:var(--clay);}
.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;
  font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:200;display:flex;align-items:center;gap:8px;}
.notes-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;margin-bottom:10px;}
.note-item{background:var(--paper3);border-radius:8px;padding:9px 11px;font-size:12.5px;}
.note-item .nd{font-size:10.5px;color:var(--slate);margin-top:3px;}
svg.chart text{font-family:var(--font-mono);}

@media (max-width:880px){
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}
  .field-row,.field-row3{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%);transition:.2s;z-index:60;}
  .sidebar.open{transform:translateX(0);}
  .hamburger{display:flex;}
  .land-card{grid-template-columns:1fr;}
  .land-side{display:none;}
  .kanban{grid-template-columns:1fr;}
  .pub-hero h1{font-size:30px;}
}
</style>
</head>

<div id="app"></div>
<div id="toastHost"></div>
<script>
/* ===================== NorthStone — app logic ===================== */
const STORAGE_KEY = 'NS_v1';

const PLANS = {

  pro:    { key:'pro',     name:'Pro',     priceMYR:899, priceSGD:280, maxAgents:Infinity, maxListings:Infinity, analytics:true, pdfExport:true, featured:true }
};
const STAGES = ['New','Contacted','Viewing Scheduled','Negotiation','Closed Won','Closed Lost'];

function fmtDate(iso){ if(!iso) return '—'; const d = new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(iso){ if(!iso) return '—'; const d = new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ', ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function fmtMoney(amount, currency){
  const n = Math.round(amount||0).toLocaleString('en-US');
  return (currency||'MYR') + ' ' + n;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function blankDB(){
  return { agencies:[], agents:[], listings:[], leads:[], viewings:[], deals:[], notifications:[], session:{ area:'login' } };
}

    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}

let DB = loadDB() || seedDB();

/* ---------- query helpers ---------- */
function agency(id){ return DB.agencies.find(a=>a.id===id); }
function agent(id){ return DB.agents.find(a=>a.id===id); }
function listing(id){ return DB.listings.find(l=>l.id===id); }
function lead(id){ return DB.leads.find(l=>l.id===id); }
function agentsOf(agencyId){ return DB.agents.filter(a=>a.agencyId===agencyId); }
function listingsOf(agencyId, agentId){ return DB.listings.filter(l=>l.agencyId===agencyId && (!agentId || l.agentId===agentId)); }
function leadsOf(agencyId, agentId){ return DB.leads.filter(l=>l.agencyId===agencyId && (!agentId || l.agentId===agentId)); }
function viewingsOf(agencyId, agentId){ return DB.viewings.filter(v=>v.agencyId===agencyId && (!agentId || v.agentId===agentId)); }
function dealsOf(agencyId, agentId){ return DB.deals.filter(d=>d.agencyId===agencyId && (!agentId || d.agentId===agentId)); }
function planOf(agencyId){ return PLANS[agency(agencyId).plan]; }

function checkLimit(agencyId, type){
  const plan = planOf(agencyId);
  if(type==='agents'){ const used = agentsOf(agencyId).length; return { allowed: used < plan.maxAgents, used, limit: plan.maxAgents }; }
  if(type==='listings'){ const used = listingsOf(agencyId).length; return { allowed: used < plan.maxListings, used, limit: plan.maxListings }; }
  return { allowed:true, used:0, limit:Infinity };
}

/* ===================== Router / shell render ===================== */
function go(area, page, extra){
  DB.session.area = area;
  if(page) DB.session.page = page;
  if(extra) Object.assign(DB.session, extra);
  saveDB();
  closeSidebar();
  render();
  window.scrollTo(0,0);
}
function setSession(patch){ Object.assign(DB.session, patch); saveDB(); }

let modalNode = null;
function openModal(html, opts){
  closeModal();
  const wrap = document.createElement('div');
  wrap.className = 'modal-overlay';
  wrap.id = 'modalOverlay';
  wrap.innerHTML = `<div class="modal ${opts&&opts.wide?'wide':''}">${html}</div>`;
  wrap.addEventListener('mousedown', (e)=>{ if(e.target.id==='modalOverlay') closeModal(); });
  document.body.appendChild(wrap);
  modalNode = wrap;
}
function closeModal(){ if(modalNode){ modalNode.remove(); modalNode=null; } }
function toast(msg){
  const host = document.getElementById('toastHost');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = msg;
  host.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}
function closeSidebar(){ const s = document.querySelector('.sidebar'); if(s) s.classList.remove('open'); }
function toggleSidebar(){ const s = document.querySelector('.sidebar'); if(s) s.classList.toggle('open'); }

function badge(text, type){ return `<span class="badge badge-${type}">${esc(text)}</span>`; }
function stageBadge(stage){
  const map = { 'New':'slate','Contacted':'brass','Viewing Scheduled':'brass','Negotiation':'clay','Closed Won':'sage','Closed Lost':'slate' };
  return badge(stage, map[stage]||'slate');
}
function planBadge(planKey){ return planKey==='pro' ? badge('PRO','brass') : badge('STARTER','slate'); }

function render(){
  const app = document.getElementById('app');
  const area = DB.session.area;
  if(area==='login') app.innerHTML = renderLogin();
  else if(area==='public') app.innerHTML = renderPublicSite();
  else if(area==='superadmin') app.innerHTML = renderShell('superadmin');
  else if(area==='agency') app.innerHTML = renderShell('agency');
  else if(area==='agent') app.innerHTML = renderShell('agent');
  else app.innerHTML = renderLogin();
}

/* ===================== Super Admin views ===================== */
function platformMRR(){
  return DB.agencies.reduce((sum,a)=> sum + (a.status==='active' ? PLANS[a.plan].priceMYR : 0), 0);
}
function viewSAOverview(){
  const totalAgencies = DB.agencies.length;
  const totalAgents = DB.agents.length;
  const totalListings = DB.listings.length;
  const activeListings = DB.listings.filter(l=>l.status==='Available').length;
  const mrr = platformMRR();
  const proCount = DB.agencies.filter(a=>a.plan==='pro').length;
  return `
  <div class="grid grid-4">
    <div class="stat-card"><div class="lbl">Agencies on platform</div><div class="val">${totalAgencies}</div><div class="sub">${proCount} on Pro plan</div></div>
    <div class="stat-card"><div class="lbl">Total agents</div><div class="val">${totalAgents}</div><div class="sub">across all agencies</div></div>
    <div class="stat-card"><div class="lbl">Total listings</div><div class="val">${totalListings}</div><div class="sub">${activeListings} currently available</div></div>
    <div class="stat-card"><div class="lbl">Platform MRR</div><div class="val mono">${fmtMoney(mrr,'MYR')}</div><div class="sub">monthly recurring, est.</div></div>
  </div>
  <div class="section-head"><h2>Agencies</h2><button class="btn btn-sm" data-action="go-page" data-page="agencies">Manage all →</button></div>
  <div class="table-wrap"><table>
    <tr><th>Agency</th><th>Country</th><th>Plan</th><th>Agents</th><th>Listings</th><th>Status</th></tr>
    ${DB.agencies.map(a=>`
      <tr>
        <td class="tname">${esc(a.name)}</td>
        <td>${esc(a.city)}, ${esc(a.country)}</td>
        <td>${planBadge(a.plan)}</td>
        <td>${agentsOf(a.id).length}</td>
        <td>${listingsOf(a.id).length}</td>
        <td>${a.status==='active'?badge('Active','sage'):badge('Suspended','clay')}</td>
      </tr>`).join('')}
  </table></div>`;
}
function viewSAAgencies(){
  return `
  <div class="toolbar"><div class="spacer"></div><button class="btn btn-brass" data-action="open-add-agency">+ Add agency</button></div>
  <div class="table-wrap"><table>

    ${DB.agencies.map(a=>`

/* ===================== Overview (agency + agent share this) ===================== */
function viewOverview(scope, mode){
  const { agencyId, agentId } = scope;
  const listings = listingsOf(agencyId, agentId);
  const leads = leadsOf(agencyId, agentId);
  const viewings = viewingsOf(agencyId, agentId).filter(v=>v.status==='Scheduled' && new Date(v.datetime) >= new Date());
  const deals = dealsOf(agencyId, agentId);
  const pendingComm = deals.filter(d=>d.payoutStatus==='Pending').reduce((s,d)=> s + (mode==='agent'?d.agentCommission:d.agencyCommission), 0);
  const wonThisMonth = deals.filter(d=>{ const dt=new Date(d.closedAt); const now=new Date(); return dt.getMonth()===now.getMonth() && dt.getFullYear()===now.getFullYear(); }).length;
  const cur = agency(agencyId).currency;
  const plan = planOf(agencyId);

  let limitsHtml = '';
  if(mode==='agency'){
    const lim = checkLimit(agencyId,'listings'), alim = checkLimit(agencyId,'agents');
    limitsHtml = `
    <div class="section-head"><h2>Plan usage</h2><span>${planBadge(agency(agencyId).plan)}</span></div>
    <div class="grid grid-2">
      <div class="card"><div class="lbl" style="font-size:12px;color:var(--slate);font-weight:600;">Listings used</div>
        <div style="display:flex;justify-content:space-between;margin:8px 0 6px;font-size:13px;"><span class="mono">${lim.used} / ${lim.limit===Infinity?'∞':lim.limit}</span></div>
        <div class="progress ${lim.limit!==Infinity && lim.used/lim.limit>0.8?'danger':''}"><div style="width:${lim.limit===Infinity?Math.min(lim.used*3,100):Math.min(100,lim.used/lim.limit*100)}%"></div></div></div>
      <div class="card"><div class="lbl" style="font-size:12px;color:var(--slate);font-weight:600;">Agents used</div>
        <div style="display:flex;justify-content:space-between;margin:8px 0 6px;font-size:13px;"><span class="mono">${alim.used} / ${alim.limit===Infinity?'∞':alim.limit}</span></div>
        <div class="progress ${alim.limit!==Infinity && alim.used/alim.limit>0.8?'danger':''}"><div style="width:${alim.limit===Infinity?Math.min(alim.used*15,100):Math.min(100,alim.used/alim.limit*100)}%"></div></div></div>
    </div>`;
  }

  return `
  <div class="grid grid-4">
    <div class="stat-card"><div class="lbl">${mode==='agent'?'My listings':'Active listings'}</div><div class="val">${listings.filter(l=>l.status==='Available').length}</div><div class="sub">${listings.length} total</div></div>
    <div class="stat-card"><div class="lbl">${mode==='agent'?'My leads':'Open leads'}</div><div class="val">${leads.filter(l=>!l.stage.startsWith('Closed')).length}</div><div class="sub">${leads.length} total in pipeline</div></div>
    <div class="stat-card"><div class="lbl">Upcoming viewings</div><div class="val">${viewings.length}</div><div class="sub">scheduled ahead</div></div>
    <div class="stat-card"><div class="lbl">Commission pending</div><div class="val mono" style="font-size:21px;">${fmtMoney(pendingComm,cur)}</div><div class="sub">${wonThisMonth} deal(s) closed this month</div></div>
  </div>
  ${limitsHtml}
  <div class="section-head"><h2>Recent leads</h2><button class="btn btn-sm" data-action="go-page" data-page="leads">View pipeline →</button></div>
  <div class="table-wrap"><table>
    <tr><th>Name</th><th>Property</th><th>Stage</th><th>Agent</th><th>Updated</th></tr>
    ${leads.slice().sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,6).map(l=>{
      const lst = listing(l.listingId);
      return `<tr><td class="tname">${esc(l.name)}</td><td>${lst?esc(lst.title):'—'}</td><td>${stageBadge(l.stage)}</td><td>${esc(agent(l.agentId).name)}</td><td>${fmtDate(l.updatedAt)}</td></tr>`;
    }).join('') || `<tr><td colspan="5" class="empty">No leads yet.</td></tr>`}
  </table></div>
  <div class="section-head"><h2>Upcoming viewings</h2><button class="btn btn-sm" data-action="go-page" data-page="viewings">View all →</button></div>
  <div class="table-wrap"><table>
    <tr><th>Date</th><th>Property</th><th>Lead</th><th>Agent</th></tr>
    ${viewings.slice().sort((a,b)=>new Date(a.datetime)-new Date(b.datetime)).slice(0,5).map(v=>{
      const lst = listing(v.listingId), ld = lead(v.leadId);
      return `<tr><td class="mono">${fmtDateTime(v.datetime)}</td><td>${lst?esc(lst.title):'—'}</td><td>${ld?esc(ld.name):'—'}</td><td>${esc(agent(v.agentId).name)}</td></tr>`;
    }).join('') || `<tr><td colspan="4" class="empty">No upcoming viewings.</td></tr>`}
  </table></div>`;
}

/* ===================== Listings ===================== */
function viewListings(scope, mode){
  const { agencyId, agentId } = scope;
  const f = DB.session.listingFilter || {};
  let listings = listingsOf(agencyId, agentId);
  if(f.status) listings = listings.filter(l=>l.status===f.status);
  if(f.type) listings = listings.filter(l=>l.listingType===f.type);
  if(f.category==='commercial') listings = listings.filter(l=>['Commercial','Land'].includes(l.propertyType));
  if(f.category==='residential') listings = listings.filter(l=>!['Commercial','Land'].includes(l.propertyType));
  if(f.agent && mode==='agency') listings = listings.filter(l=>l.agentId===f.agent);
  if(f.city) listings = listings.filter(l=>l.city===f.city);
  if(f.furnished) listings = listings.filter(l=>l.furnished===f.furnished);
  if(f.priceMin) listings = listings.filter(l=>l.price>=parseFloat(f.priceMin));
  if(f.priceMax) listings = listings.filter(l=>l.price<=parseFloat(f.priceMax));
  if(f.sqftMin) listings = listings.filter(l=>l.sqft>=parseFloat(f.sqftMin));
  if(f.sqftMax) listings = listings.filter(l=>l.sqft<=parseFloat(f.sqftMax));
  if(f.q) listings = listings.filter(l=>(l.title+l.city+l.state+l.address).toLowerCase().includes(f.q.toLowerCase()));
  listings.sort((a,b)=>{
    const aC=['Commercial','Land'].includes(a.propertyType)?0:1, bC=['Commercial','Land'].includes(b.propertyType)?0:1;
    if(aC!==bC) return aC-bC;
    if(f.sort==='price_asc') return a.price-b.price;
    if(f.sort==='price_desc') return b.price-a.price;
    if(f.sort==='sqft_desc') return b.sqft-a.sqft;
    return new Date(b.createdAt)-new Date(a.createdAt);
  });
  const lim = checkLimit(agencyId,'listings');
  const KL=['Ampang','Bangsar','Bangsar South','Bukit Bintang','Cheras','Damansara Heights','KLCC','Mont Kiara','Petaling Jaya','Puchong','Shah Alam','Sri Hartamas','Subang Jaya','Wangsa Maju'];
  const PN=['Batu Ferringhi','George Town','Jelutong','Kepala Batas','Sungai Ara','Tanjung Bungah','Tanjung Tokong'];
  const JB=['Iskandar Puteri','Johor Bahru','Kempas','Kulai','Masai','Permas Jaya','Skudai','Tebrau'];
  const SG=['Bishan','Jurong East','Marina Bay','Orchard','Punggol','Sentosa Cove','Tiong Bahru','Woodlands'];
  return `
  <div style="background:var(--paper3);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px;">
    <div class="toolbar" style="margin-bottom:10px;">
      <div class="search-box"><span class="ic">⌕</span><input placeholder="Search title, city, area..." value="${esc(f.q||'')}" oninput="updateListingFilter('q',this.value)" style="min-width:200px;"></div>
      <select onchange="updateListingFilter('type',this.value)"><option value="">Sale & Rent</option><option value="sale" ${f.type==='sale'?'selected':''}>For sale</option><option value="rent" ${f.type==='rent'?'selected':''}>For rent</option></select>
      <select onchange="updateListingFilter('category',this.value)"><option value="">All categories</option><option value="commercial" ${f.category==='commercial'?'selected':''}>🏛 Commercial (primary)</option><option value="residential" ${f.category==='residential'?'selected':''}>🏠 Residential</option></select>
      <select onchange="updateListingFilter('status',this.value)"><option value="">All status</option>${['Available','Under Offer','Sold','Rented'].map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${s}</option>`).join('')}</select>
      ${mode==='agency'?`<select onchange="updateListingFilter('agent',this.value)"><option value="">All agents</option>${agentsOf(agencyId).map(a=>`<option value="${a.id}" ${f.agent===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}</select>`:''}
    </div>
    <div class="toolbar" style="flex-wrap:wrap;row-gap:6px;margin-bottom:0;">
      <select onchange="updateListingFilter('city',this.value)"><option value="">All locations</option><optgroup label="KL & Selangor">${KL.map(c=>`<option ${f.city===c?'selected':''}>${c}</option>`).join('')}</optgroup><optgroup label="Penang">${PN.map(c=>`<option ${f.city===c?'selected':''}>${c}</option>`).join('')}</optgroup><optgroup label="Johor Bahru">${JB.map(c=>`<option ${f.city===c?'selected':''}>${c}</option>`).join('')}</optgroup><optgroup label="Singapore">${SG.map(c=>`<option ${f.city===c?'selected':''}>${c}</option>`).join('')}</optgroup></select>
      <select onchange="updateListingFilter('furnished',this.value)"><option value="">Any furnishing</option>${['Furnished','Semi-Furnished','Unfurnished'].map(s=>`<option ${f.furnished===s?'selected':''}>${s}</option>`).join('')}</select>
      <input type="number" placeholder="Min price" value="${f.priceMin||''}" oninput="updateListingFilter('priceMin',this.value)" style="width:105px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--paper2);">
      <input type="number" placeholder="Max price" value="${f.priceMax||''}" oninput="updateListingFilter('priceMax',this.value)" style="width:105px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--paper2);">
      <input type="number" placeholder="Min sqft" value="${f.sqftMin||''}" oninput="updateListingFilter('sqftMin',this.value)" style="width:95px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--paper2);">
      <input type="number" placeholder="Max sqft" value="${f.sqftMax||''}" oninput="updateListingFilter('sqftMax',this.value)" style="width:95px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--paper2);">
      <select onchange="updateListingFilter('sort',this.value)"><option value="">Newest first</option><option value="price_asc" ${f.sort==='price_asc'?'selected':''}>Price: Low → High</option><option value="price_desc" ${f.sort==='price_desc'?'selected':''}>Price: High → Low</option><option value="sqft_desc" ${f.sort==='sqft_desc'?'selected':''}>Largest first</option></select>
      <div class="spacer"></div>
      <span class="hint mono">${lim.used}/${lim.limit===Infinity?'∞':lim.limit}</span>
      <button class="btn btn-brass" data-action="open-add-listing" ${!lim.allowed?'disabled title="Plan limit reached"':''}>+ Add listing</button>
    </div>
  </div>
  ${!lim.allowed?`<div class="card" style="border-color:var(--clay);background:var(--clay-bg);margin-bottom:16px;font-size:13px;">Starter plan limit reached. <a style="font-weight:700;text-decoration:underline;" data-action="go-page" data-page="billing">Upgrade to Pro →</a></div>`:''}
  <p class="hint" style="margin-bottom:10px;">${listings.length} listing(s) · commercial shown first</p>
  <div class="prop-grid">
    ${listings.length?listings.map(l=>propCard(l,mode)).join(''):`<div class="empty" style="grid-column:1/-1;"><div class="big">▤</div>No listings match these filters.</div>`}
  </div>`;}

function updateListingFilter(key,val){ DB.session.listingFilter = {...(DB.session.listingFilter||{}), [key]:val}; saveDB(); render(); }

function propCard(l, mode){
  const tagClass = l.status==='Sold'?'sold':(l.status==='Rented'?'rented':'');
  const isCom = ['Commercial','Land'].includes(l.propertyType);
  const artBg = l.images && l.images[0]
    ? `background:url('${l.images[0]}') center/cover no-repeat;`
    : `background:linear-gradient(150deg,${isCom?'#E8F0FB,#D0DDF5':'var(--paper3),var(--line)'});`;
  return `
  <div class="prop-card">
    <div class="prop-art" style="${artBg}">
      ${(!l.images || !l.images[0]) ? `<span>${PROP_ICON[l.propertyType]||'🏠'}</span>` : ''}
      <div class="prop-tag ${tagClass}">${l.status.toUpperCase()}</div>
      ${isCom?'<div class="prop-featured" style="background:var(--brass);color:var(--ink);">🏛 COMMERCIAL</div>':l.featured?'<div class="prop-featured">★ FEATURED</div>':''}
      ${l.furnished?`<div style="position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;">${esc(l.furnished)}</div>`:''}
    </div>
    <div class="prop-body">
      <div class="prop-price">${fmtMoney(l.price,l.currency)}<span>${l.listingType==='rent'?'/mo':''}</span></div>
      <div class="prop-title">${esc(l.title)}</div>
      <div class="prop-loc">${esc(l.city)}, ${esc(l.state)}</div>
      <div class="prop-meta">
        ${l.bedrooms?`<span>${l.bedrooms} bed</span>`:''}${l.bathrooms?`<span>${l.bathrooms} bath</span>`:''}<span>${l.sqft.toLocaleString()} sqft</span>
      </div>
      <div class="prop-foot">
        <span class="prop-agent">${esc(agent(l.agentId).name)}</span>
        <div class="row-actions">
          <button class="btn btn-sm" data-action="open-edit-listing" data-id="${l.id}">Edit</button>
          ${planOf(l.agencyId).pdfExport ? `<button class="btn btn-sm" data-action="export-brochure" data-id="${l.id}">PDF</button>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

    <div class="field"><label>Property type</label><select id="f_propertyType">${Object.keys(PROP_ICON).map(t=>`<option ${l.propertyType===t?'selected':''}>${t}</option>`).join('')}</select></div>

function saveNewListing(agencyId, defaultAgentId){
  const agentId = document.getElementById('f_agentId') ? document.getElementById('f_agentId').value : defaultAgentId;
  const l = {
    id: uid('lst'), agencyId, agentId,
    title: document.getElementById('f_title').value || 'Untitled listing',
    propertyType: document.getElementById('f_propertyType').value,
    listingType: document.getElementById('f_listingType').value,
    price: parseFloat(document.getElementById('f_price').value)||0,
    currency: document.getElementById('f_currency').value,
    state: document.getElementById('f_state').value,
    city: document.getElementById('f_city').value,
    country: document.getElementById('f_country').value,
    address: document.getElementById('f_address').value,
    bedrooms: parseInt(document.getElementById('f_bedrooms').value)||0,
    bathrooms: parseInt(document.getElementById('f_bathrooms').value)||0,
    sqft: parseInt(document.getElementById('f_sqft').value)||0,
    status: document.getElementById('f_status').value,
    description: document.getElementById('f_description').value,
    featured: document.getElementById('f_featured').checked,
    furnished: document.getElementById('f_furnished').value,
    images: window._listingImages && window._listingImages.length ? [...window._listingImages] : [],

  DB.listings.push(l); saveDB(); closeModal(); render(); toast('✓ Listing added');
}

function saveEditListing(id){
  const l = listing(id);
  Object.assign(l, {

  const pending = deals.filter(d=>d.payoutStatus==='Pending').reduce((s,d)=>s + (mode==='agent'?d.agentCommission:d.agencyCommission), 0);
  return `

      const lst = listing(d.listingId);

      const agentNet = d.agentNet || d.agentCommission || 0;
      return `<tr>
        <td><div class="tname">${lst?esc(lst.title):'—'}</div>${d.isCoBroke?`<div class="tsub" style="color:var(--brass-dark);">Co-broke: ${esc(d.coBrokeAgencyName||'partner')}</div>`:''}</td>

        <td>${fmtDate(d.closedAt)}</td>

function saveNewDeal(agencyId, currency){
  const salePrice = parseFloat(document.getElementById('f_dprice').value)||0;
  const rate = parseFloat(document.getElementById('f_drate').value)||0;
  const split = parseFloat(document.getElementById('f_dsplit').value)||0;
  const refPct = parseFloat(document.getElementById('f_drefpct').value)||0;
  const isCoBroke = document.getElementById('f_dcobroke') && document.getElementById('f_dcobroke').checked;
  const coPct = isCoBroke ? (parseFloat(document.getElementById('f_dcopct').value)||50) : 0;
  const grossAgencyCommission = salePrice * rate / 100;
  const cobrokeCommission = isCoBroke ? grossAgencyCommission * coPct / 100 : 0;
  const netAgencyCommission = grossAgencyCommission - cobrokeCommission;
  const agentCommission = netAgencyCommission * split / 100;
  const referralFee = agentCommission * refPct / 100;
  const agentNet = agentCommission - referralFee;
  const listingId = document.getElementById('f_dlisting').value;
  const agentId = document.getElementById('f_dagent').value;
  const d = {
    id: uid('deal'), agencyId, agentId, listingId, leadId:null,
    salePrice, currency, commissionRate:rate, agentSplit:split,
    grossAgencyCommission, cobrokeCommission, agencyCommission: netAgencyCommission,
    agentCommission, referralFee, agentNet,
    isCoBroke,
    coBrokeAgencyName: isCoBroke && document.getElementById('f_dconame') ? document.getElementById('f_dconame').value : '',
    coBrokeAgentName: isCoBroke && document.getElementById('f_dcoagent') ? document.getElementById('f_dcoagent').value : '',
    coBrokePct: coPct,
    referrerName: document.getElementById('f_drefname').value,
    referralFeePct: refPct,
    payoutStatus:'Pending', closedAt: nowISO()
  };
  DB.deals.push(d);
  const lst = listing(listingId); if(lst) lst.status = lst.listingType==='rent' ? 'Rented' : 'Sold';
  addNotification(agencyId,'agent',agentId,'🏆 Deal closed!',`Your commission of ${fmtMoney(agentNet,currency)} has been recorded for ${lst?lst.title:'your listing'}.`);
  saveDB(); closeModal(); render(); toast('✓ Deal recorded — agent nets '+fmtMoney(agentNet,currency));
}
function markDealPaid(id){ const d = DB.deals.find(x=>x.id===id); d.payoutStatus='Paid'; d.paidAt=nowISO(); saveDB(); render(); toast('✓ Marked as paid'); }

/* ===================== Reports ===================== */
function svgBarChart(items, opts){
  opts = opts || {};
  const w = opts.width || 560, h = opts.height || 220, pad = 36;
  const max = Math.max(1, ...items.map(i=>i.value));
  const bw = (w - pad*2) / items.length;
  const bars = items.map((it,i)=>{
    const bh = (it.value/max) * (h - pad*2);
    const x = pad + i*bw + bw*0.18;
    const y = h - pad - bh;
    const bwidth = bw*0.64;
    return `<rect x="${x}" y="${y}" width="${bwidth}" height="${bh}" rx="3" fill="${opts.color||'var(--brass)'}"></rect>
      <text x="${x+bwidth/2}" y="${h-pad+16}" text-anchor="middle" font-size="10.5" fill="var(--slate)">${esc(it.label)}</text>
      <text x="${x+bwidth/2}" y="${y-7}" text-anchor="middle" font-size="10.5" fill="var(--ink)" font-weight="600">${it.display!=null?it.display:it.value}</text>`;
  }).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" width="100%" height="${h}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="var(--line)" stroke-width="1"></line>
    ${bars}
  </svg>`;
}
function viewReports(scope){
  const { agencyId } = scope;
  const a = agency(agencyId);
  if(!planOf(agencyId).analytics){
    return `<div class="card" style="text-align:center;padding:50px 20px;"><div style="font-size:34px;">▣</div><h3 style="margin-top:10px;">Analytics is a Pro feature</h3><p class="hint" style="margin-top:6px;">Upgrade your plan to unlock revenue, forecast, and pipeline reports.</p><button class="btn btn-brass" style="margin-top:14px;" data-action="go-page" data-page="billing">View plans →</button></div>`;
  }
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push({key:d.getFullYear()+'-'+d.getMonth(),label:d.toLocaleDateString('en-GB',{month:'short'})});}
  const deals=dealsOf(agencyId);
  const leads=leadsOf(agencyId);
  const agents=agentsOf(agencyId);
  const revByMonth=months.map(m=>{
    const sum=deals.filter(d=>{const dt=new Date(d.closedAt);return (dt.getFullYear()+'-'+dt.getMonth())===m.key;}).reduce((s,d)=>s+(d.grossAgencyCommission||d.agencyCommission||0),0);
    return {label:m.label,value:sum,display:Math.round(sum/1000)+'k'};
  });
  const funnel=STAGES.map(s=>({label:s.replace('Closed ','').replace('Scheduled','Sched.'),value:leads.filter(l=>l.stage===s).length}));
  const last3=revByMonth.slice(-3).map(m=>m.value);
  const avg3=last3.reduce((s,v)=>s+v,0)/Math.max(1,last3.filter(v=>v>0).length||1);
  const forecast=['Next mo','In 2 mo','In 3 mo'].map((label,i)=>({label,value:Math.round(avg3*Math.pow(1.08,i+1)),display:Math.round(avg3*Math.pow(1.08,i+1)/1000)+'k'}));
  return `
  <div class="section-head"><h2>Commission revenue — last 6 months</h2>
    <button class="btn btn-sm btn-brass" data-action="export-report-pdf" data-agencyid="${agencyId}">⬇ Export report PDF</button>
  </div>
  <div class="card">${svgBarChart(revByMonth,{color:'var(--brass)'})}</div>
  <div class="section-head"><h2>Sales forecast — next 3 months (+8% growth projection)</h2></div>
  <div class="card">${svgBarChart(forecast,{color:'var(--sage)'})}</div>
  <div class="section-head"><h2>Lead pipeline funnel</h2></div>
  <div class="card">${svgBarChart(funnel,{color:'var(--brass-light)'})}</div>
  <div class="section-head"><h2>Agent commission summary</h2></div>
  <div class="table-wrap"><table>
    <tr><th>Agent</th><th>Type</th><th>REN No.</th><th>Listings</th><th>Deals</th><th>Earned</th><th>Pending</th></tr>
    ${agents.map(ag=>{
      const myDeals=dealsOf(agencyId,ag.id);
      const earned=myDeals.reduce((s,d)=>s+(d.agentNet||d.agentCommission||0),0);
      const pend=myDeals.filter(d=>d.payoutStatus==='Pending').reduce((s,d)=>s+(d.agentNet||d.agentCommission||0),0);
      return `<tr>
        <td><div style="display:flex;align-items:center;gap:8px;">${ag.profilePhoto?`<img src="${ag.profilePhoto}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">`:''}<span class="tname">${esc(ag.name)}</span></div></td>
        <td>${badge(ag.agentType==='parttime'?'Part-time':'Full-time','slate')}</td>
        <td class="mono tsub">${esc(ag.renNumber||'—')}</td>
        <td>${listingsOf(agencyId,ag.id).length}</td>
        <td>${myDeals.length}</td>
        <td class="mono"><b>${fmtMoney(earned,a.currency)}</b></td>
        <td class="mono" style="color:var(--clay);">${fmtMoney(pend,a.currency)}</td>
      </tr>`;
    }).join('')}
  </table></div>`;
}

function updatePubFilter(key,val){ DB.session.pubFilter = {...(DB.session.pubFilter||{}), [key]:val}; saveDB(); render(); }
function openPublicListing(id){ DB.session.publicSub='detail'; DB.session.publicListingId=id; saveDB(); render(); window.scrollTo(0,0); }
function renderPublicDetail(){
  const l = listing(DB.session.publicListingId);
  if(!l) return renderPublicSite();
  const ag = agent(l.agentId);

function submitInquiry(listingId){
  const l = listing(listingId);
  const name = document.getElementById('pf_name').value.trim();
  if(!name){ toast('⚠ Please enter your name'); return; }
  const newLead = {
    id: uid('led'), agencyId:l.agencyId, agentId:l.agentId, listingId:l.id,
    name, email: document.getElementById('pf_email').value, phone: document.getElementById('pf_phone').value,
    source:'Public Inquiry', stage:'New',
    notes: document.getElementById('pf_msg').value ? [{text:document.getElementById('pf_msg').value, date:nowISO()}] : [],
    createdAt: nowISO(), updatedAt: nowISO()
  };
  DB.leads.push(newLead); saveDB();
  toast('✓ Enquiry sent — the agent will be in touch shortly');
  DB.session.publicSub='browse'; saveDB(); render(); window.scrollTo(0,0);
}

/* ===================== PDF export (jsPDF) ===================== */
function exportBrochurePDF(id){
  const l = listing(id), ag = agent(l.agentId), a = agency(l.agencyId);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.text(l.title, 14, 20);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text(`${l.address}, ${l.city}, ${l.state}, ${l.country}`, 14, 29);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text(fmtMoney(l.price, l.currency) + (l.listingType==='rent'?' / month':''), 14, 40);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text(`${l.propertyType}  ·  ${l.bedrooms} bed  ·  ${l.bathrooms} bath  ·  ${l.sqft.toLocaleString()} sqft  ·  ${l.status}`, 14, 48);
  doc.text(doc.splitTextToSize(l.description||'', 180), 14, 60);
  doc.setFontSize(10); doc.setTextColor(110);
  doc.text(`Listing agent: ${ag.name}  ·  ${ag.email}  ·  ${ag.phone}`, 14, 110);
  doc.text(`${a.name}  ·  Generated by NorthStone`, 14, 117);
  doc.save(`brochure-${l.id}.pdf`);
  toast('✓ Brochure PDF downloaded');
}
function exportCommissionPDF(id){
  const d = DB.deals.find(x=>x.id===id), l = listing(d.listingId), ag = agent(d.agentId), a = agency(d.agencyId);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

/* ===================== Helper: image compression ===================== */
function previewAgentPhoto(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const MAX=240, canvas=document.createElement('canvas');
      let w=img.width, h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      window._agentPhotoData = canvas.toDataURL('image/jpeg', 0.8);
      const prev = document.getElementById('aphoto_preview');
      if(prev) prev.innerHTML = `<img src="${window._agentPhotoData}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--line);">`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

window._listingImages = [];
function handleListingImages(input){
  const files = Array.from(input.files).slice(0,4);
  if(!files.length) return;
  window._listingImages = [];
  const preview = document.getElementById('listing_img_preview');
  if(preview) preview.innerHTML = '<span class="hint">Compressing...</span>';
  let done = 0;
  files.forEach((file,i)=>{
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        const MAX=800, canvas=document.createElement('canvas');
        let w=img.width, h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        window._listingImages[i] = canvas.toDataURL('image/jpeg', 0.72);
        done++;
        if(done===files.length && preview){
          preview.innerHTML = window._listingImages.filter(Boolean).map((src,idx)=>
            `<div style="position:relative;"><img src="${src}" style="width:80px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--line);"><button onclick="removeListingImg(${idx})" style="position:absolute;top:-5px;right:-5px;background:var(--clay);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;padding:0;line-height:1;">✕</button></div>`
          ).join('');
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function removeListingImg(idx){
  window._listingImages.splice(idx,1);
  const preview = document.getElementById('listing_img_preview');
  if(preview) preview.innerHTML = window._listingImages.filter(Boolean).map((src,i)=>
    `<div style="position:relative;"><img src="${src}" style="width:80px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--line);"><button onclick="removeListingImg(${i})" style="position:absolute;top:-5px;right:-5px;background:var(--clay);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;padding:0;line-height:1;">✕</button></div>`
  ).join('');
}

/* ===================== Notifications ===================== */
function addNotification(agencyId, targetRole, targetId, title, body){
  if(!DB.notifications) DB.notifications = [];
  DB.notifications.unshift({ id:uid('ntf'), agencyId, targetRole, targetId, title, body, read:false, createdAt:nowISO() });
  if(DB.notifications.length>100) DB.notifications = DB.notifications.slice(0,100);
  saveDB();
}
function getUnreadNotifs(area, session){
  if(!DB.notifications) return [];
  return DB.notifications.filter(n=>{
    if(n.read) return false;
    if(area==='agent') return n.targetRole==='agent' && n.targetId===session.agentId;
    if(area==='agency') return n.targetRole==='agency' && n.agencyId===session.agencyId;
    return false;
  });
}
function openNotifPanel(){
  const { area } = DB.session;
  const notifs = getUnreadNotifs(area, DB.session);
  notifs.forEach(n=>{ n.read=true; }); saveDB();
  openModal(`
    <div class="modal-head"><h3>🔔 Notifications</h3><button class="btn btn-ghost btn-sm" data-action="close-modal">✕</button></div>
    ${notifs.length ? notifs.map(n=>`<div class="note-item"><b>${esc(n.title)}</b><p style="margin-top:3px;font-size:12.5px;">${esc(n.body)}</p><div class="nd">${fmtDateTime(n.createdAt)}</div></div>`).join('') : '<div class="empty">No new notifications.</div>'}
    <div class="modal-foot"><button class="btn" data-action="close-modal">Close</button></div>
  `);
}

/* ===================== Report PDF export ===================== */
function exportReportPDF(agencyId){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const a = agency(agencyId);
  const allDeals = dealsOf(agencyId);
  const agents = agentsOf(agencyId);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text(`${a.name} — Agency Report`, 14, 18);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(100);
  doc.text(`Generated: ${fmtDate(nowISO())} · ${a.city}, ${a.country} · Plan: ${a.plan.toUpperCase()}`, 14, 25);
  doc.setTextColor(0);
  doc.setLineWidth(0.4); doc.line(14, 29, 196, 29);
  let y = 37;
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.text('Overall Summary', 14, y); y+=7;
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  const totalComm = allDeals.reduce((s,d)=>s+(d.grossAgencyCommission||d.agencyCommission||0),0);
  const pending = allDeals.filter(d=>d.payoutStatus==='Pending').reduce((s,d)=>s+(d.agentNet||d.agentCommission||0),0);
  doc.text(`Total deals closed: ${allDeals.length}   |   Total agency commission: ${fmtMoney(totalComm,a.currency)}   |   Pending agent payout: ${fmtMoney(pending,a.currency)}`, 14, y); y+=10;
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.text('Agent Performance Summary', 14, y); y+=7;
  const colW=[52,22,30,20,45,40];
  const hdr=['Agent','Type','REN No.','Deals','Commission','Pending'];
  doc.setFontSize(8.5); doc.setFont('helvetica','bold');
  let x=14; hdr.forEach((h,i)=>{doc.text(h,x,y);x+=colW[i];}); y+=5;
  doc.setLineWidth(0.2); doc.line(14,y,196,y); y+=5;
  doc.setFont('helvetica','normal');
  agents.forEach(ag=>{
    const myDeals=dealsOf(agencyId,ag.id);
    const earned=myDeals.reduce((s,d)=>s+(d.agentNet||d.agentCommission||0),0);
    const pend=myDeals.filter(d=>d.payoutStatus==='Pending').reduce((s,d)=>s+(d.agentNet||d.agentCommission||0),0);
    x=14;
    [ag.name.slice(0,22), ag.agentType||'fulltime', ag.renNumber||'—', String(myDeals.length), fmtMoney(earned,a.currency), fmtMoney(pend,a.currency)].forEach((v,i)=>{doc.text(v,x,y);x+=colW[i];});
    y+=6; if(y>270){doc.addPage();y=20;}
  });
  y+=4; doc.line(14,y,196,y); y+=6;
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.text('Deals Log', 14, y); y+=7;
  const dCols=[50,30,35,30,35]; const dHdr=['Property','Agent','Sale price','Comm. rate','Agent net'];
  doc.setFontSize(8.5); doc.setFont('helvetica','bold');
  x=14; dHdr.forEach((h,i)=>{doc.text(h,x,y);x+=dCols[i];}); y+=5;
  doc.line(14,y,196,y); y+=4;
  doc.setFont('helvetica','normal');
  allDeals.slice().sort((a,b)=>new Date(b.closedAt)-new Date(a.closedAt)).forEach(d=>{
    const lst=listing(d.listingId), ag=agent(d.agentId);
    x=14;
    [(lst?lst.title:'—').slice(0,26), ag.name.slice(0,16), fmtMoney(d.salePrice,d.currency), d.commissionRate+'%', fmtMoney(d.agentNet||d.agentCommission||0,d.currency)].forEach((v,i)=>{doc.text(v,x,y);x+=dCols[i];});
    y+=5; if(y>272){doc.addPage();y=20;}
  });
  doc.setFontSize(8); doc.setTextColor(130);
  doc.text('Generated by NorthStone Real Estate Software', 14, 287);
  doc.save(`${a.name.replace(/\s+/g,'-')}-report-${new Date().toISOString().slice(0,10)}.pdf`);
  toast('✓ Report PDF downloaded');
}

/* ===================== Global click dispatcher ===================== */
document.addEventListener('click', function(e){
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  const id = t.dataset.id;
  switch(action){
    case 'go-page': go(DB.session.area, t.dataset.page); break;
    case 'go-public': goPublic(); break;
    case 'go-login': goLogin(); break;
    case 'back-to-browse': backToBrowse(); break;
    case 'logout': logout(); break;
    case 'toggle-sidebar': toggleSidebar(); break;
    case 'close-modal': closeModal(); break;

    case 'login-public': loginPublic(); break;
    case 'login-superadmin': loginSuperAdmin(); break;
    case 'login-agency': loginAgency(id); break;
    case 'login-agent': loginAgent(id); break;

    case 'open-add-listing': openAddListingModal(); break;
    case 'open-edit-listing': openEditListingModal(id); break;
    case 'save-new-listing': saveNewListing(t.dataset.agencyid, t.dataset.agentid); break;
    case 'save-edit-listing': saveEditListing(id); break;
    case 'delete-listing': deleteListing(id); break;
    case 'export-brochure': exportBrochurePDF(id); break;

    case 'open-add-lead': openAddLeadModal(); break;
    case 'save-new-lead': saveNewLead(t.dataset.agencyid, t.dataset.agentid); break;
    case 'open-lead-detail': openLeadDetail(id); break;
    case 'add-lead-note': addLeadNote(id); break;
    case 'schedule-viewing-from-lead': closeModal(); openAddViewingModal(id); break;

    case 'open-add-viewing': openAddViewingModal(); break;
    case 'save-new-viewing': saveNewViewing(t.dataset.agencyid); break;
    case 'mark-viewing': markViewing(id, t.dataset.status); break;

    case 'open-add-agent': openAddAgentModal(); break;
    case 'save-new-agent': saveNewAgent(t.dataset.agencyid); break;
    case 'toggle-agent-status': toggleAgentStatus(id); break;

    case 'open-add-deal': openAddDealModal(); break;
    case 'save-new-deal': saveNewDeal(t.dataset.agencyid, t.dataset.currency); break;
    case 'mark-deal-paid': markDealPaid(id); break;
    case 'export-commission': exportCommissionPDF(id); break;

    case 'save-commission-rules': saveCommissionRules(t.dataset.agencyid); break;
    case 'upgrade-plan': upgradePlan(id); break;
    case 'downgrade-plan': downgradePlan(id); break;

    case 'open-add-agency': openAddAgencyModal(); break;
    case 'open-notifs': openNotifPanel(); break;
    case 'export-report-pdf': exportReportPDF(t.dataset.agencyid); break;
    case 'save-new-agency': saveNewAgency(); break;
    case 'toggle-plan': togglePlan(id); break;
    case 'toggle-agency-status': toggleAgencyStatus(id); break;

    case 'open-public-listing': openPublicListing(id); break;
    case 'submit-inquiry': submitInquiry(id); break;
  }
});
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });

/* ===================== Init ===================== */
render();
if('serviceWorker' in navigator){
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
